<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quiz</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{

    background:
    linear-gradient(to bottom right, #1e3a8a, #0f172a);

    min-height:100vh;

    overflow:hidden;

    color:white;
}

/* MENIU */

header{

    width:100%;

    padding:20px 40px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    background: rgba(255,255,255,0.08);

    backdrop-filter: blur(10px);

    border-bottom:1px solid rgba(255,255,255,0.15);
}

.menu-left,
.menu-right{

    display:flex;

    gap:15px;

    align-items:center;
}

.menu-btn{

    text-decoration:none;

    color:white;

    padding:12px 18px;

    border-radius:12px;

    background: rgba(255,255,255,0.12);

    transition:0.3s;

    font-weight:bold;
}

.menu-btn:hover{

    background:#38bdf8;
}

/* TITLU */

.title{

    text-align:center;

    margin-top:40px;

    font-size:60px;

    text-shadow:2px 2px 10px rgba(0,0,0,0.5);
}

/* CONTAINER */

.quiz-container{

    width:100%;

    height:75vh;

    display:flex;

    justify-content:center;

    align-items:center;
}

/* BUTON ROTUND */

.quiz-button{

    width:320px;

    height:320px;

    border-radius:50%;

    text-decoration:none;

    display:flex;

    justify-content:center;

    align-items:center;

    text-align:center;

    padding:40px;

    font-size:38px;

    font-weight:bold;

    color:white;

    background:
    radial-gradient(circle at 30% 30%,
    rgba(255,255,255,0.8),
    rgba(56,189,248,0.5),
    rgba(30,58,138,0.9));

    border:3px solid rgba(255,255,255,0.35);

    box-shadow:
    inset -20px -20px 35px rgba(255,255,255,0.08),
    inset 12px 12px 20px rgba(255,255,255,0.3),
    0 0 40px rgba(56,189,248,0.35);

    transition:0.5s;
}

/* REFLEXIE */

.quiz-button::before{

    content:"";

    position:absolute;

    width:90px;

    height:90px;

    background:rgba(255,255,255,0.45);

    border-radius:50%;

    top:110px;

    left:110px;

    filter:blur(6px);
}

/* HOVER */

.quiz-button:hover{

    transform:scale(1.08);

    box-shadow:
    0 0 60px rgba(56,189,248,0.7);
}

/* RESPONSIVE */

@media(max-width:850px){

    body{
        overflow:auto;
    }

    header{

        flex-direction:column;

        gap:20px;
    }

    .menu-right{

        flex-wrap:wrap;

        justify-content:center;
    }

    .title{

        font-size:42px;
    }

    .quiz-button{

        width:240px;

        height:240px;

        font-size:28px;
    }

    .quiz-button::before{

        top:75px;

        left:75px;

        width:70px;

        height:70px;
    }
}

</style>
</head>

<body>

<header>

    <div class="menu-left">
        <a href="index.html" class="menu-btn">Acasă</a>
    </div>

    <div class="menu-right">
        <a href="informatii.html" class="menu-btn">Informații</a>
        <a href="articole.html" class="menu-btn">Articole</a>
        <a href="declaratii.html" class="menu-btn">Declarații</a>
        <a href="galerie.html" class="menu-btn">Galerie</a>
        <a href="concluzii.html" class="menu-btn">Concluzii</a>
    </div>

</header>

<h1 class="title">Quiz</h1>

<div class="quiz-container">

    <a href="https://www.mentimeter.com/app/presentation/alu7srh78r4cmy2x4bvk1zii697vzsqh/present?question=u95eavxob7mz" class="quiz-button">

        Începe Quiz-ul

    </a>

</div>

</body>
</html>
